#################################################################################
# Extends SOClass awskin for templates.
#
# ---------------------------- COLORS -------------------------------------------
# Colors can be defined in two ways:
# - First: 	Integer representing RGB value color
#			(Bits 24-31 are alpha, 16-23 are red, 8-15 are green, 0-7 are blue)
# - Second: Arrays of 4 Integers (comma-separated). 
#			- First value representing red component in the range 0-255.
#			- Second value representing green component in the range 0-255.
#			- Third value representing blue component in the range 0-255.
#			- Forth value representing alpha component in the range 0-255.
#			Alpha can be ignored.
#
# Example of First method (Color Pink):  -20561
# Example of Second method (Color Pink): 255,175,175,255 (or 255,175,175)
#
# -------------------------------- FONTS ----------------------------------------
# Fonts can be defined inside: skin/config/font-rewrite-kernel.xml (awskin module)
# or using a arrays of 3 element: String fontName, int style, int size 
# (See Font.java for more info)
# The style are 0 for PLAIN, 1 for BOLD, 2 for ITALIC and 3 for mix BOLD-ITALIC.
#
# Example of First method: KVisualPage.text
# Example of Second method: Dialog, 1, 12
#
# --------------------------------- BORDERS -------------------------------------
# Border are defined programmatically, if you want to add a new Border style, 
# you should modify AWVisualTemplate.java inside asygate module to add border with
# a javax.swing.BorderFactory as in KVisualPage.java.
#
# Available border are: 
# .- emptyBorder
# .- underlineFieldBorderGray
# .- underlineFieldBorder
# .- underlineFieldBorderRed
# .- underlineFieldBorderYellow
# .- underlineFieldBorderBlue
# .- underlineFieldBorderBlack
# .- raisedBevelBorder
# .- loweredBevelBorder
# .- etchedBorder
#
# ---------------------------------- BACKGROUNDS ---------------------------------
# Available backgrounds values type:
# .- NORMAL: 0
# .- CENTER: 1
# .- STRETCH: 2
# .- TILE: 3
# .- NONE: 4
# 
# ------------------------------------ HEADERS -----------------------------------
# HEADERS are defined programmatically, if you want to add a new header, you must
# modify AWVisutalTemplate.java. Avaible headers values are:
# .- NO Header: 0
# .- TopRandomSplitHeader: 1
#
# ------------------------------------ PARAMETERS -----------------------------------
# - All images or paths are AWSkin related.
# - You can implement as many template as you required, the behaviour template follow
#	the Tree pattern, for example, if you use "asyman.bol" as your template inside
#	VP_Radical, the class will search for a property as follow:
#	1. Property with the template "asyman.bol"  
#	2. If property is not found, property with template: "asyman"
#	3. If property is not found, property with template: "default"
#
# For more information see: un.asygate.visual.AWVisualTemplate.java

