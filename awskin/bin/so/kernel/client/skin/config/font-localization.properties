#Substitute the font names for specific language. The syntax is:
#FontNameToSubstituteInFontRewriteXML#Language[_Country[_Dialect]]=NewSubstitutedNameInFontRewriteXML
#
#Purposed to be used together with font-rewrite.xml in order to change automatically
#the systems fonts - the substitution is made on the UI attribute,
#
# Example - for kmerian language, assign automatically different UI - for mangal.
SpecialTableEditors#km=SpecialTableEditors-mangal
