# ===========================================
# E-SHIPMENT MODULE CONFIGURATION
# ===========================================

# -------------------------------------------
# MAIN DATABASE CONNECTION
# -------------------------------------------
# These keys match S_Shipment.class.getName() + "#PropertyName"
sw.eshipment.server.S_Shipment#SHP_DataBaseURL=$[sw.eshipment_URL]
sw.eshipment.server.S_Shipment#SHP_DataBaseUser=$[sw.eshipment_User]
sw.eshipment.server.S_Shipment#SHP_DataBasePassword=$[sw.eshipment_Password]

# -------------------------------------------
# TRANSACTION TABLES
# -------------------------------------------
sw.eshipment.server.S_Shipment#SHP_GEN_TAB=SHIPMENT_TRANSFER_NOTES

# -------------------------------------------
# GCF SYSTEM TABLES
# -------------------------------------------
module.sw.eshipment.gcf.url=$[sw.eshipment.gcf_URL]
module.sw.eshipment.gcf.user=$[sw.eshipment.gcf_User]
module.sw.eshipment.gcf.password=$[sw.eshipment.gcf_Password]

module.sw.eshipment.gcf.tables.ied=SW_ESHIPMENT_IED
module.sw.eshipment.gcf.tables.history=SW_ESHIPMENT_HISTORY
module.sw.eshipment.gcf.tables.locks=SW_ESHIPMENT_LOCKS
module.sw.eshipment.gcf.tables.track=SW_ESHIPMENT_TRACK