# ===========================================
# E-SHIPMENT TRANSFER NOTE MODULE CONFIGURATION
# ===========================================
# -------------------------------------------
# DATABASE CONNECTION
# -------------------------------------------
# Links to the S_Shipment constants for URL, User, and Password
sw.eshipment.server.S_Shipment#SHP_DataBaseURL=$[sw.eshipment_URL]
sw.eshipment.server.S_Shipment#SHP_DataBaseUser=$[sw.eshipment_User]
sw.eshipment.server.S_Shipment#SHP_DataBasePassword=$[sw.eshipment_Password]

# -------------------------------------------
# TRANSACTION TABLES (mapped from TC_* classes)
# -------------------------------------------
# Main document table used by TC_ShipmentGen
sw.eshipment.server.S_Shipment#SHP_GEN_TAB=SHIPMENT_TRANSFER_NOTES

# Table for Cargo SubDataSet (if moved to a dedicated child table)
sw.eshipment.server.S_Shipment#SHP_CARGO_TAB=SHIPMENT_CARGO_ITEMS

# -------------------------------------------
# FEATURE FLAGS & UI PERFORMANCE
# -------------------------------------------
# Ensures the Visual Document is pre-cached for faster client response
sw.eshipment.client.VD_Shipment#PreLoaded=yes

# -------------------------------------------
# WORKFLOW BEHAVIOR
# -------------------------------------------
# Automatically generates Reference Numbers if the field is empty
sw.eshipment.server.S_Shipment#AutoGenRef=yes